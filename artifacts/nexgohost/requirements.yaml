packages:
  "recharts": "For displaying beautiful charts on the admin and client dashboards"
  "date-fns": "For formatting dates in tables and tickets"
  "framer-motion": "For page transitions and interactive animations"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"
  "@hookform/resolvers": "For Zod form validation"
  "react-hook-form": "For complex forms like ticket creation and registration"

images:
  - path: "artifacts/nexgohost/public/images/auth-bg.png"
    description: "Dark, moody, abstract technological background with deep purple and indigo glowing neon lines resembling server racks and data flow, futuristic enterprise SaaS style"
    aspect_ratio: "16:9"
  - path: "artifacts/nexgohost/public/images/logo-icon.png"
    description: "Minimalist modern tech logo icon featuring a stylized letter N formed by glowing purple neon geometric shapes on a transparent background"
    aspect_ratio: "1:1"

notes:
  - "Assuming @workspace/api-client-react is properly aliased to export hooks."
  - "Assuming customFetch automatically attaches the Bearer token from localStorage('token')."
  - "Assuming shadcn/ui components are available in @/components/ui/."
