kind = "web"
previewPath = "/"
title = "Nexgohost - Hosting Management Platform"
version = "1.0.0"
id = "artifacts/nexgohost"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23274

[services.development]
run = "pnpm --filter @workspace/nexgohost run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexgohost", "run", "build" ]
publicDir = "artifacts/nexgohost/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23274"
BASE_PATH = "/"
