openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Noehost Billing & Client Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: admin-dashboard
    description: Admin dashboard statistics
  - name: clients
    description: Client management
  - name: hosting
    description: Hosting plan management
  - name: domains
    description: Domain management
  - name: orders
    description: Order management
  - name: invoices
    description: Invoice and billing management
  - name: tickets
    description: Support ticket system
  - name: migrations
    description: 20i website migrations
  - name: payments
    description: Payment gateway
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin-dashboard]
      summary: Get admin dashboard statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardStats"

  /admin/clients:
    get:
      operationId: getClients
      tags: [clients]
      summary: List all clients
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"

  /admin/clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /admin/clients/{id}/suspend:
    post:
      operationId: suspendClient
      tags: [clients]
      summary: Suspend client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /admin/clients/{id}/activate:
    post:
      operationId: activateClient
      tags: [clients]
      summary: Activate client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /admin/clients/{id}/reset-password:
    post:
      operationId: resetClientPassword
      tags: [clients]
      summary: Reset client password
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /hosting/plans:
    get:
      operationId: getHostingPlans
      tags: [hosting]
      summary: List hosting plans
      responses:
        "200":
          description: List of hosting plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HostingPlan"
    post:
      operationId: createHostingPlan
      tags: [hosting]
      summary: Create hosting plan (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHostingPlanRequest"
      responses:
        "201":
          description: Created hosting plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostingPlan"

  /hosting/plans/{id}:
    put:
      operationId: updateHostingPlan
      tags: [hosting]
      summary: Update hosting plan (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHostingPlanRequest"
      responses:
        "200":
          description: Updated hosting plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostingPlan"
    delete:
      operationId: deleteHostingPlan
      tags: [hosting]
      summary: Delete hosting plan (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/hosting:
    get:
      operationId: getAllHostingServices
      tags: [hosting]
      summary: List all hosting services (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All hosting services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HostingService"

  /admin/hosting/{id}/suspend:
    post:
      operationId: suspendHosting
      tags: [hosting]
      summary: Suspend hosting service
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hosting suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostingService"

  /admin/hosting/{id}/terminate:
    post:
      operationId: terminateHosting
      tags: [hosting]
      summary: Terminate hosting service
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hosting terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostingService"

  /client/hosting:
    get:
      operationId: getMyHosting
      tags: [hosting]
      summary: Get my hosting services
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My hosting services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HostingService"

  /domains:
    get:
      operationId: getMyDomains
      tags: [domains]
      summary: Get my domains
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My domains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Domain"

  /admin/domains:
    get:
      operationId: getAllDomains
      tags: [domains]
      summary: List all domains (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All domains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Domain"

  /admin/domains/pricing:
    get:
      operationId: getDomainPricing
      tags: [domains]
      summary: Get domain pricing (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Domain pricing
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DomainPricing"
    post:
      operationId: setDomainPricing
      tags: [domains]
      summary: Set domain pricing (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainPricingRequest"
      responses:
        "200":
          description: Domain pricing updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainPricing"

  /admin/domains/{id}/renew:
    post:
      operationId: renewDomain
      tags: [domains]
      summary: Renew domain (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Domain renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"

  /orders:
    get:
      operationId: getMyOrders
      tags: [orders]
      summary: Get my orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/orders:
    get:
      operationId: getAllOrders
      tags: [orders]
      summary: List all orders (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/orders/{id}/approve:
    post:
      operationId: approveOrder
      tags: [orders]
      summary: Approve order (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/orders/{id}/cancel:
    post:
      operationId: cancelOrder
      tags: [orders]
      summary: Cancel order (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /invoices:
    get:
      operationId: getMyInvoices
      tags: [invoices]
      summary: Get my invoices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /admin/invoices:
    get:
      operationId: getAllInvoices
      tags: [invoices]
      summary: List all invoices (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create invoice (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /admin/invoices/{id}/mark-paid:
    post:
      operationId: markInvoicePaid
      tags: [invoices]
      summary: Mark invoice as paid (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice marked paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}/pay:
    post:
      operationId: payInvoice
      tags: [invoices]
      summary: Pay invoice
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayInvoiceRequest"
      responses:
        "200":
          description: Payment initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"

  /tickets:
    get:
      operationId: getMyTickets
      tags: [tickets]
      summary: Get my support tickets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create support ticket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get ticket details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"

  /tickets/{id}/reply:
    post:
      operationId: replyToTicket
      tags: [tickets]
      summary: Reply to ticket
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReplyRequest"
      responses:
        "201":
          description: Reply added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketMessage"

  /admin/tickets:
    get:
      operationId: getAllTickets
      tags: [tickets]
      summary: List all tickets (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /admin/tickets/{id}/close:
    post:
      operationId: closeTicket
      tags: [tickets]
      summary: Close ticket (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket closed
          content:
            application/json:
              schema:
