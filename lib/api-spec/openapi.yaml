  /migrations:
    get:
      operationId: getMyMigrations
      tags: [migrations]
      summary: Get my migrations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My migrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Migration"
    post:
      operationId: requestMigration
      tags: [migrations]
      summary: Request website migration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MigrationRequest"
      responses:
        "201":
          description: Migration requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Migration"

  /admin/migrations:
    get:
      operationId: getAllMigrations
      tags: [migrations]
      summary: List all migrations (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All migrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Migration"

  /admin/migrations/{id}/status:
    put:
      operationId: updateMigrationStatus
      tags: [migrations]
      summary: Update migration status (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMigrationStatusRequest"
      responses:
        "200":
          description: Migration status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Migration"

  /payments/stripe/create-intent:
    post:
      operationId: createStripePaymentIntent
      tags: [payments]
      summary: Create Stripe payment intent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripePaymentIntentRequest"
      responses:
        "200":
          description: Payment intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripePaymentIntentResponse"

  /payments/transactions:
    get:
      operationId: getTransactions
      tags: [payments]
      summary: Get transaction log
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Transaction log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /client/dashboard:
    get:
      operationId: getClientDashboard
      tags: [admin-dashboard]
      summary: Get client dashboard data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Client dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDashboardData"

  /account:
    get:
      operationId: getAccount
      tags: [auth]
      summary: Get account settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateAccount
      tags: [auth]
      summary: Update account settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
        company:
          type: string
        phone:
          type: string
      required:
        - firstName
        - lastName
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        company:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [admin, client]
        status:
          type: string
          enum: [active, suspended]
        createdAt:
          type: string
      required:
        - id
        - firstName
        - lastName
        - email
        - role
        - status
        - createdAt

    UpdateAccountRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        company:
          type: string
        phone:
          type: string
        currentPassword:
          type: string
        newPassword:
          type: string

    UpdateClientRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        company:
          type: string
        phone:
          type: string
        status:
          type: string

    ResetPasswordRequest:
      type: object
      properties:
        newPassword:
          type: string
      required:
        - newPassword

    AdminDashboardStats:
      type: object
      properties:
        totalClients:
          type: number
        activeHosting:
          type: number
        totalDomains:
          type: number
        pendingOrders:
          type: number
        monthlyRevenue:
          type: number
        totalRevenue:
          type: number
        openTickets:
          type: number
        activeMigrations:
          type: number
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        recentClients:
          type: array
          items:
            $ref: "#/components/schemas/Client"
      required:
        - totalClients
        - activeHosting
        - totalDomains
        - pendingOrders
        - monthlyRevenue
        - totalRevenue
        - openTickets
        - activeMigrations
